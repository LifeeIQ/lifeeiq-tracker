<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIFEE // IQ TRACKER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #060813;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .glow-sphere-1 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, rgba(0,0,0,0) 70%);
            top: -50px;
            left: -50px;
            z-index: 1;
            filter: blur(40px);
        }

        .glow-sphere-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, rgba(0,0,0,0) 70%);
            bottom: 5%;
            right: -100px;
            z-index: 1;
            filter: blur(50px);
        }

        .container {
            width: 100%;
            max-width: 400px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.4);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
        }

        .logo {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            color: rgba(0, 240, 255, 0.7);
            text-transform: uppercase;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.07);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        .balance-section {
            text-align: center;
            padding: 30px 0;
        }

        .balance-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
        }

        .balance-value {
            font-size: 46px;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(180deg, #ffffff 40%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 20px;
        }

        .stat-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00b8d4 0%, #00e5ff 100%);
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fb7185;
        }

        .btn-confirm {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #10b981;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .section-title {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            margin-left: 10px;
            margin-bottom: 5px;
        }

        .history-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.015);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .history-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .history-desc {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .history-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }

        .history-amount {
            font-size: 15px;
            font-weight: 700;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .amount-plus {
            color: #00f0ff;
        }

        .amount-minus {
            color: #fb7185;
        }

        .amount-pending {
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <div class="container">
        <div class="glass-card header">
            <div class="logo">LIFEE // IQ</div>
            <div class="user-badge" id="username">ADMIN</div>
        </div>

        <div class="glass-card balance-section">
            <div class="balance-label">Доступно к выплате</div>
            <div class="balance-value" id="balance">0.00 ₽</div>
        </div>

        <div class="stats-grid">
            <div class="glass-card stat-card">
                <div class="stat-label">Часы</div>
                <div class="stat-value" id="hours">0 ч.</div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-label">Ожидание</div>
                <div class="stat-value" id="pending" style="color: #fbbf24;">0 ₽</div>
            </div>
        </div>

        <button class="btn btn-primary" onclick="addShift()">
            💼 Добавить смену
        </button>
        <button class="btn btn-secondary" onclick="requestWithdrawal()">
            💵 Вывести зарплату
        </button>
        <button class="btn btn-delete" onclick="deleteLastShift()">
            🗑 Удалить последнюю смену
        </button>

        <div class="section-title">История операций</div>
        <div class="history-section" id="history">
            <!-- Динамическая история -->
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Безопасное всплывающее окно
        function safeAlert(msg) {
            if (window.Telegram && tg.showAlert) {
                tg.showAlert(msg);
            } else {
                alert(msg);
            }
        }

        // --- ИНИЦИАЛИЗАЦИЯ И ЧТЕНИЕ LOCALSTORAGE ---
        function getShifts() {
            return JSON.parse(localStorage.getItem('lifeeiq_shifts')) || [];
        }

        function getWithdrawals() {
            return JSON.parse(localStorage.getItem('lifeeiq_withdrawals')) || [];
        }

        function saveShifts(data) {
            localStorage.setItem('lifeeiq_shifts', JSON.stringify(data));
        }

        function saveWithdrawals(data) {
            localStorage.setItem('lifeeiq_withdrawals', JSON.stringify(data));
        }

        // --- РАСЧЕТ И ОТРИСОВКА ЭКРАНА ---
        function loadData() {
            try {
                const shifts = getShifts();
                const withdrawals = getWithdrawals();

                // 1. Считаем статистику
                let totalEarned = 0;
                let totalHours = 0;
                shifts.forEach(s => {
                    totalEarned += s.earned;
                    totalHours += s.hours;
                });

                let totalPending = 0;
                let totalPaid = 0;
                withdrawals.forEach(w => {
                    if (w.status === 'pending') {
                        totalPending += w.amount;
                    } else if (w.status === 'paid') {
                        totalPaid += w.amount;
                    }
                });

                const availableBalance = totalEarned - totalPaid - totalPending;

                // 2. Обновляем цифры на экране
                document.getElementById('balance').innerText = availableBalance.toLocaleString() + ' ₽';
                document.getElementById('hours').innerText = totalHours + ' ч.';
                document.getElementById('pending').innerText = totalPending.toLocaleString() + ' ₽';
                document.getElementById('username').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name.toUpperCase() : "ADMIN";

                // 3. Объединяем и рендерим историю
                const historyContainer = document.getElementById('history');
                historyContainer.innerHTML = '';

                // Объединяем смены и выводы в один список
                let combinedList = [];
                shifts.forEach(s => {
                    combinedList.push({
                        id: s.id,
                        type: 'shift',
                        desc: s.desc,
                        amount: s.earned,
                        date: s.date,
                        timestamp: s.timestamp
                    });
                });

                withdrawals.forEach(w => {
                    combinedList.push({
                        id: w.id,
                        type: 'withdrawal',
                        desc: w.status === 'pending' ? 'Запрос вывода (ожидание)' : 'Выплата получена',
                        amount: w.amount,
                        status: w.status,
                        date: w.date,
                        timestamp: w.timestamp
                    });
                });

                // Сортируем: новые сверху
                combinedList.sort((a, b) => b.timestamp - a.timestamp);

                if (combinedList.length > 0) {
                    combinedList.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'history-item';
                        
                        if (item.type === 'shift') {
                            // Отображение смены
                            div.innerHTML = `
                                <div class="history-info">
                                    <span class="history-desc">${item.desc}</span>
                                    <span class="history-date">${item.date}</span>
                                </div>
                                <div class="history-amount amount-plus">+${item.amount.toLocaleString()} ₽</div>
                            `;
                        } else {
                            // Отображение вывода
                            if (item.status === 'pending') {
                                div.innerHTML = `
                                    <div class="history-info">
                                        <span class="history-desc" style="color:#fbbf24;">${item.desc}</span>
                                        <span class="history-date">${item.date}</span>
                                    </div>
                                    <div class="history-amount">
                                        <span class="amount-pending">-${item.amount.toLocaleString()} ₽</span>
                                        <button class="btn-confirm" onclick="confirmWithdrawal(${item.id})">✅ Получил</button>
                                    </div>
                                `;
                            } else {
                                div.innerHTML = `
                                    <div class="history-info">
                                        <span class="history-desc" style="color:rgba(255,255,255,0.4);">${item.desc}</span>
                                        <span class="history-date">${item.date}</span>
                                    </div>
                                    <div class="history-amount amount-minus">-${item.amount.toLocaleString()} ₽</div>
                                `;
                            }
                        }
                        historyContainer.appendChild(div);
                    });
                } else {
                    historyContainer.innerHTML = `
                        <div style="text-align:center; color:rgba(255,255,255,0.2); font-size:13px; padding:30px;">
                            Истории пока нет
                        </div>
                    `;
                }
            } catch (e) {
                console.error(e);
            }
        }

        // --- ДОБАВИТЬ СМЕНУ ---
        function addShift() {
            const hours = prompt("⏱ Введите часы за смену:");
            const earned = prompt("💰 Сколько заработано (руб):");
            const desc = prompt("📍 Название объекта:");
            if (!hours || !earned || !desc) return;

            const shifts = getShifts();
            const newShift = {
                id: Date.now(),
                hours: parseFloat(hours),
                earned: parseFloat(earned),
                desc: desc,
                date: new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }),
                timestamp: Date.now()
            };

            shifts.push(newShift);
            saveShifts(shifts);
            safeAlert("✅ Смена добавлена локально!");
            loadData();
        }

        // --- ЗАПРОС ВЫВОДА ---
        function requestWithdrawal() {
            const amount = prompt("💵 Какую сумму поставить на вывод?");
            if (!amount) return;

            const withdrawals = getWithdrawals();
            const newWithdrawal = {
                id: Date.now(),
                amount: parseFloat(amount),
                status: 'pending',
                date: new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }),
                timestamp: Date.now()
            };

            withdrawals.push(newWithdrawal);
            saveWithdrawals(withdrawals);
            safeAlert("⏳ Запрос создан! Сделай скриншот и отправь отцу.");
            loadData();
        }

        // --- ПОДТВЕРДИТЬ ПОЛУЧЕНИЕ ДЕНЕГ ---
        function confirmWithdrawal(id) {
            const withdrawals = getWithdrawals();
            const updated = withdrawals.map(w => {
                if (w.id === id) {
                    w.status = 'paid';
                }
                return w;
            });
            saveWithdrawals(updated);
            safeAlert("✅ Выплата подтверждена!");
            loadData();
        }

        // --- УДАЛИТЬ ПОСЛЕДНЮЮ СМЕНУ ---
        function deleteLastShift() {
            const shifts = getShifts();
            if (shifts.length === 0) {
                safeAlert("У вас пока нет записанных смен.");
                return;
            }

            const last = shifts[shifts.length - 1];
            const confirmDelete = confirm(`⚠️ Внимание!\nУдалить последнюю смену:\n📍 ${last.desc} на сумму ${last.earned} ₽?`);
            if (!confirmDelete) return;

            shifts.pop(); // Удаляем последний элемент
            saveShifts(shifts);
            safeAlert("🗑 Последняя смена удалена!");
            loadData();
        }

        // Первоначальный запуск системы
        loadData();
    </script>
</body>
</html>
