<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIFEE // IQ TRACKER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #060813;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .glow-sphere-1 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(123, 97, 255, 0.3) 0%, rgba(0,0,0,0) 70%);
            top: -50px;
            left: -50px;
            z-index: 1;
            filter: blur(40px);
        }

        .glow-sphere-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.2) 0%, rgba(0,0,0,0) 70%);
            bottom: 5%;
            right: -100px;
            z-index: 1;
            filter: blur(50px);
        }

        .container {
            width: 100%;
            max-width: 400px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.4);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
        }

        .logo {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.07);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        .balance-section {
            text-align: center;
            padding: 30px 0;
        }

        .balance-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
        }

        .balance-value {
            font-size: 46px;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(180deg, #ffffff 40%, #8b8fb9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
        }

        .stat-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.25);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .section-title {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            margin-left: 10px;
            margin-bottom: 5px;
        }

        .history-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.015);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .history-info {
            display: flex;
            flex-direction: column;
        }

        .history-desc {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .history-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 4px;
        }

        .history-amount {
            font-size: 15px;
            font-weight: 700;
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <div class="container">
        <div class="glass-card header">
            <div class="logo">LIFEE // IQ</div>
            <div class="user-badge" id="username">ADMIN</div>
        </div>

        <div class="glass-card balance-section">
            <div class="balance-label">Доступно к выплате</div>
            <div class="balance-value" id="balance">0.00 ₽</div>
        </div>

        <div class="stats-grid">
            <div class="glass-card stat-card">
                <div class="stat-label">Часы</div>
                <div class="stat-value" id="hours">0 ч.</div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-label">Ожидание</div>
                <div class="stat-value" id="pending" style="color: #fbbf24;">0 ₽</div>
            </div>
        </div>

        <button class="btn btn-primary" onclick="addShift()">
            💼 Добавить смену
        </button>
        <button class="btn btn-secondary" onclick="tg.showAlert('Функция вывода будет настроена на следующем шаге!')">
            💵 Вывести зарплату
        </button>

        <div class="section-title">История</div>
        <div class="history-section" id="history">
            <div class="history-item">
                <div class="history-info">
                    <span class="history-desc">Система готова к работе</span>
                    <span class="history-date">сегодня</span>
                </div>
                <div class="history-amount">OK</div>
            </div>
        </div>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // При загрузке тянем данные с сервера
    fetch('https://LifeeIQ.pythonanywhere.com/get_data')
        .then(res => res.json())
        .then(data => {
            document.getElementById('balance').innerText = data.balance.toFixed(2) + ' ₽';
        });

    async function addShift() {
        const hours = prompt("⏱ Часы:");
        const earned = prompt("💰 Рубли:");
        if (!hours || !earned) return;
        
        await fetch('https://LifeeIQ.pythonanywhere.com/add_shift', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ hours, earned, date: 'сегодня' })
        });
        location.reload(); // Перезагрузка страницы, чтобы обновить баланс
    }
    </script>
</body>
</html>
