<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFEE // IQ TRACKER</title>
    <!-- Подключаем SDK Телеграма, чтобы сайт понимал, кто его открыл -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #060813;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Светящиеся сферы на фоне (эффект глубины Aero) */
        .glow-sphere-1 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(123, 97, 255, 0.4) 0%, rgba(0,0,0,0) 70%);
            top: -50px;
            left: -50px;
            z-index: 1;
            filter: blur(40px);
        }

        .glow-sphere-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.25) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: -100px;
            z-index: 1;
            filter: blur(50px);
        }

        .container {
            width: 100%;
            max-width: 400px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 10px;
        }

        /* Эффект матового стекла (Aero Glass) */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Главный баланс */
        .balance-section {
            text-align: center;
            padding: 10px 0;
        }

        .balance-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
        }

        .balance-value {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        /* Стильные стеклянные кнопки */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.8) 0%, rgba(168, 85, 247, 0.8) 100%);
            box-shadow: 0 4px 15px 0 rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .history-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .history-desc {
            font-weight: 500;
        }

        .history-date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }

        .history-amount {
            font-weight: 700;
            color: #10b981;
        }

        .history-amount.withdraw {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <div class="container">
        <!-- Шапка -->
        <div class="glass-card header">
            <div class="logo">LIFEE // IQ</div>
            <div class="user-badge" id="username">Сэр</div>
        </div>

        <!-- Баланс -->
        <div class="glass-card balance-section">
            <div class="balance-label">Виртуальный баланс</div>
            <div class="balance-value" id="balance">12 500.00 ₽</div>
        </div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="glass-card stat-card">
                <div class="stat-label">Всего часов</div>
                <div class="stat-value" id="hours">298 ч.</div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-label">На выводе</div>
                <div class="stat-value" id="pending" style="color: #fbbf24;">0.00 ₽</div>
            </div>
        </div>

        <!-- Действия -->
        <button class="btn btn-primary" onclick="alert('Добавим смену при подключении бэкенда!')">
            💼 Добавить смену
        </button>
        <button class="btn btn-secondary" onclick="alert('Запрос вывода заработает на следующем шаге!')">
            💵 Запросить вывод
        </button>

        <!-- История -->
        <div class="glass-card history-section">
            <div class="section-title">История операций</div>
            <div class="history-item">
                <div>
                    <div class="history-desc">Волховский район (обвязка)</div>
                    <div class="history-date">вчера, 22:45</div>
                </div>
                <div class="history-amount">+8 000 ₽</div>
            </div>
            <div class="history-item">
                <div>
                    <div class="history-desc">Лодейное поле (адаптер)</div>
                    <div class="history-date">позавчера, 19:12</div>
                </div>
                <div class="history-amount">+4 500 ₽</div>
            </div>
        </div>
    </div>

    <script>
        // Инициализируем Telegram WebApp SDK
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем приложение на весь экран телефона
        
        // Получаем имя пользователя из Телеграма
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }
    </script>
</body>
</html>
